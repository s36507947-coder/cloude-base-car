<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cloud RC Car</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; justify-content: center; user-select: none; -webkit-user-select: none; }
        h2 { color: #00ff88; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .controls { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 20px; justify-content: center; align-content: center; }
        .btn { background: #333; border: 2px solid #444; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: 0.1s; box-shadow: 0 4px #000; }
        .btn:active { background: #00ff88; transform: translateY(4px); box-shadow: none; color: #000; }
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .stop { grid-column: 2; grid-row: 2; background: #ff4444; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }
        #status { margin-top: 25px; font-weight: bold; color: #aaa; }
    </style>
</head>
<body>

    <h2>Remote Control</h2>
    <div id="status">STATUS: READY</div>

    <div class="controls">
        <div class="btn up" onmousedown="send('F')" onmouseup="send('S')" ontouchstart="send('F')" ontouchend="send('S')">▲</div>
        <div class="btn left" onmousedown="send('L')" onmouseup="send('S')" ontouchstart="send('L')" ontouchend="send('S')">◀</div>
        <div class="btn stop" onclick="send('S')">■</div>
        <div class="btn right" onmousedown="send('R')" onmouseup="send('S')" ontouchstart="send('R')" ontouchend="send('S')">▶</div>
        <div class="btn down" onmousedown="send('B')" onmouseup="send('S')" ontouchstart="send('B')" ontouchend="send('S')">▼</div>
    </div>

    <script>
        function send(cmd) {
            document.getElementById('status').innerText = "SENDING: " + cmd;
            fetch('/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            }).catch(e => console.log("Error sending command"));
        }
    </script>
</body>
</html>
